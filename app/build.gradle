plugins { id 'com.android.application' }

android {
    namespace 'com.granpa.pumpselector'
    compileSdk 35
    defaultConfig {
        applicationId 'com.granpa.pumpselector'
        minSdk 23
        targetSdk 35
        versionCode 34
        versionName '3.4.0'
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
